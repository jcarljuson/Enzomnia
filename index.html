<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enzomnia Coffee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>

    <div id="intro-overlay"></div>

    <header id="main-header">
        <nav>
            <div class="nav-links">
                <span>MENU</span>
                <span>OUR STORY</span>
                <span>CAREERS</span>
            </div>
            <div class="logo">
                <img src="/assets/logo.webp" alt="Enzomnia Logo" class="logo-img">
            </div>
            <div class="nav-links">
                <div id="cart-toggle-btn" class="nav-btn cart-icon-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span id="cart-badge" class="cart-badge" style="display: none;">0</span>
                </div>
                <div id="auth-container">
                    <div id="profile-target" class="profile-icon" onclick="handleAuthClick()">
                        <img id="display-img"
                            src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Selection_G_Suite_web_24dp.png"
                            alt="Google Logo">
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero" id="hero-section">
            <video autoplay loop muted playsinline id="hero-video" class="hero-video">
                <source src="/assets/background.webm" type="video/webm">
                Your browser does not support the video tag.
            </video>
            <div class="hero-content">
                <h1 id="hero-title">Enzomnia</h1>
                <p id="hero-subtitle">Try out something unique today.</p>
            </div>
        </section>

        <section class="menu-section">
            <h2>Drinks</h2>
            <div class="grid" id="drinks-grid">
                <!-- Drinks will be rendered here dynamically via JS -->
            </div>
        </section>

        <section class="menu-section">
            <h2>Pastries</h2>
            <div class="grid" id="pastries-grid">
                <!-- Pastries will be rendered here dynamically via JS -->
            </div>
        </section>
    </main>

    <footer class="vibe-footer">
        <p>Don't want our current menu and want a different vibe?</p>
        <p>If on a phone, <strong>shake your device</strong>. If on PC, <strong>click the Enzomnia logo 3 times</strong> at the top to force change the menu.</p>
    </footer>

    <!-- Cart Sidebar -->
    <div id="cart-sidebar" class="cart-panel hidden">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <button id="close-cart">&times;</button>
        </div>
        <div class="cart-items" id="cart-items-container">
            <!-- Cart items go here dynamically -->
        </div>
        <div class="cart-footer">
            <div class="cart-total"><span>Total:</span> <span>₱<span id="cart-total-amount">0.00</span></span></div>
            <button id="checkout-btn" class="btn">Checkout</button>
        </div>
    </div>



    <!-- Lenis Smooth Scrolling -->
    <script src="https://unpkg.com/lenis@latest/dist/lenis.min.js"></script>

    <!-- Vite handles the TypeScript compilation automatically -->
    <script type="module" src="/script.ts"></script>
</body>

</html>
